name: Run Tests

on:
    push:
        branches:
            - main
    pull_request:
        paths:
            - "apps/**"
            - "packages/**"
            - "pnpm-lock.yaml"

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup toolchain and install dependencies
              uses: ./.github/actions/setup-node-pnpm

            - name: Run all tests
              run: pnpm test
