name: Build Next Apps

on:
    push:
        branches:
            - main
    pull_request:
        paths:
            - "apps/**"
            - "packages/**"
            - "pnpm-lock.yaml"
            - "docker-compose.yml"
            - "docker-compose.ci.yml"

permissions:
    contents: read

jobs:
    next-build:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            API_URL: https://example.com
            BASE_API_URL: https://api.example.com
            FULL_API_URL: https://api.example.com/v1
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/portfolio
            NEXT_PUBLIC_BETTER_AUTH_URL: https://example.com
            BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
            DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
            GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6.3.0
              with:
                  node-version-file: "package.json"
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Start MySQL with Docker Compose
              run: docker compose -f docker-compose.ci.yml up -d --wait mysql

            - name: Wait for MySQL TCP readiness
              shell: bash
              run: |
                  for i in {1..30}; do
                    if docker compose -f docker-compose.ci.yml exec -T mysql sh -lc 'mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=tcp -uroot -p"$MYSQL_ROOT_PASSWORD" --silent'; then
                      echo "MySQL is ready over TCP"
                      exit 0
                    fi
                    echo "Waiting for MySQL TCP readiness... ($i/30)"
                    sleep 2
                  done
                  echo "MySQL did not become TCP-ready in time"
                  docker compose -f docker-compose.ci.yml logs mysql
                  exit 1

            - name: Run Drizzle migrations
              shell: bash
              run: |
                  for i in {1..3}; do
                    if pnpm --filter @mingull/database drizzle migrate; then
                      exit 0
                    fi
                    echo "Drizzle migration failed, retrying... ($i/3)"
                    sleep 5
                  done
                  echo "Drizzle migration failed after retries"
                  exit 1

            - name: Build all apps
              run: pnpm turbo run build --filter="./apps/*"

            - name: Show database logs on failure
              if: failure()
              run: docker compose -f docker-compose.ci.yml logs mysql

            - name: Stop Docker Compose services
              if: always()
              run: docker compose -f docker-compose.ci.yml down
