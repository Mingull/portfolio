name: Build Next Apps

on:
    push:
        branches:
            - main
    pull_request:
        paths:
            - "apps/**"
            - "packages/**"
            - "pnpm-lock.yaml"

permissions:
    contents: read

jobs:
    next-build:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            API_URL: https://example.com
            BASE_API_URL: https://api.example.com
            FULL_API_URL: https://api.example.com/v1
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/portfolio
            NEXT_PUBLIC_BETTER_AUTH_URL: https://example.com
            BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
            DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
            GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup toolchain and install dependencies
              uses: ./.github/actions/setup-node-pnpm

            - name: Build all apps
              run: pnpm turbo run build --filter="./apps/*"
