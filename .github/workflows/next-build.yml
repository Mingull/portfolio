name: Build Next Apps

on:
    push:
        branches:
            - main
    pull_request:
        paths:
            - "apps/**"
            - "packages/**"
            - "pnpm-lock.yaml"
            - ".github/workflows/**"

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup toolchain and install dependencies
              uses: ./.github/actions/setup-node-pnpm

            - name: Run all tests
              run: pnpm test

    database-migrations:
        runs-on: ubuntu-latest
        needs: test
        timeout-minutes: 20
        env:
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/portfolio
        services:
            mysql:
                image: mysql:8.4.8
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: portfolio
                    MYSQL_ROOT_HOST: "%"
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=tcp -uroot -p$MYSQL_ROOT_PASSWORD --silent"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=10
                    --health-start-period=20s
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup toolchain and install dependencies
              uses: ./.github/actions/setup-node-pnpm

            - name: Run Drizzle migrations
              shell: bash
              run: |
                  for i in {1..3}; do
                    if pnpm --filter @mingull/database drizzle migrate; then
                      exit 0
                    fi
                    echo "Drizzle migration failed, retrying... ($i/3)"
                    sleep 5
                  done
                  echo "Drizzle migration failed after retries"
                  exit 1

    build-apps:
        needs:
            - test
            - database-migrations
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                app:
                    - name: api
                      filter: ./apps/api
                    - name: web
                      filter: ./apps/web
        env:
            API_URL: https://example.com
            BASE_API_URL: https://api.example.com
            FULL_API_URL: https://api.example.com/v1
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/portfolio
            NEXT_PUBLIC_BETTER_AUTH_URL: https://example.com
            BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
            DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
            GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup toolchain and install dependencies
              uses: ./.github/actions/setup-node-pnpm

            - name: Build ${{ matrix.app.name }}
              run: pnpm turbo run build --filter="${{ matrix.app.filter }}"
