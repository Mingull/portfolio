name: Validate Database Migrations

on:
    push:
        branches:
            - main
    pull_request:
        paths:
            - "packages/database/**"
            - "docker-compose.yml"
            - "docker-compose.ci.yml"
            - "pnpm-lock.yaml"

permissions:
    contents: read

jobs:
    database-migrations:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/portfolio
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup toolchain and install dependencies
              uses: ./.github/actions/setup-node-pnpm

            - name: Start MySQL with Docker Compose
              run: docker compose -f docker-compose.ci.yml up -d --wait mysql

            - name: Wait for MySQL TCP readiness
              shell: bash
              run: |
                  for i in {1..30}; do
                    if docker compose -f docker-compose.ci.yml exec -T mysql sh -lc 'mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=tcp -uroot -p"$MYSQL_ROOT_PASSWORD" --silent'; then
                      echo "MySQL is ready over TCP"
                      exit 0
                    fi
                    echo "Waiting for MySQL TCP readiness... ($i/30)"
                    sleep 2
                  done
                  echo "MySQL did not become TCP-ready in time"
                  docker compose -f docker-compose.ci.yml logs mysql
                  exit 1

            - name: Run Drizzle migrations
              shell: bash
              run: |
                  for i in {1..3}; do
                    if pnpm --filter @mingull/database drizzle migrate; then
                      exit 0
                    fi
                    echo "Drizzle migration failed, retrying... ($i/3)"
                    sleep 5
                  done
                  echo "Drizzle migration failed after retries"
                  exit 1

            - name: Show database logs on failure
              if: failure()
              run: docker compose -f docker-compose.ci.yml logs mysql

            - name: Stop Docker Compose services
              if: always()
              run: docker compose -f docker-compose.ci.yml down
